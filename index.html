<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convitto 2025 — Indice</title>
<link rel="stylesheet" href="css/convitto-theme.css">
<style>

/* ─── BODY ───────────────────────────────────────────────────── */
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    background: var(--bg);
}

/* ─── HEADER ─────────────────────────────────────────────────── */
.header-container {
    text-align: center;
    margin-bottom: 40px;
}

.header-eyebrow {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
}

h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 10px;
}

.header-time {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
}

#todayDate {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    text-transform: capitalize;
}

#digitalClock {
    font-size: 0.95rem;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.06em;
}

/* ─── GRIGLIA ────────────────────────────────────────────────── */
.links-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 520px;
}

/* ─── CARD ───────────────────────────────────────────────────── */
.link-card {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    border-bottom: 4px solid var(--card-color, #cbd5e1);
    padding: 20px 12px 16px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
}

.link-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.11);
}

.link-card:active { transform: scale(0.97); }

/* Icona container */
.card-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: var(--card-dim, #f1f5f9);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s;
}

.link-card:hover .card-icon {
    background: var(--card-dim-hover, #e2e8f0);
}

.card-icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--card-color, #64748b);
    stroke-width: 1.8;
    fill: none;
}

/* Label */
.card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: 0.07em;
    text-transform: uppercase;
}

/* ─── COLORI PER SEZIONE ─────────────────────────────────────── */
.card-cloud      { --card-color:#7c3aed; --card-dim:rgba(124,58,237,0.08);  --card-dim-hover:rgba(124,58,237,0.15); }
.card-cruscotto  { --card-color:#2563eb; --card-dim:rgba(37,99,235,0.08);   --card-dim-hover:rgba(37,99,235,0.15);  }
.card-bus8       { --card-color:#ea580c; --card-dim:rgba(234,88,12,0.08);   --card-dim-hover:rgba(234,88,12,0.15);  }
.card-transfer   { --card-color:#0d9488; --card-dim:rgba(13,148,136,0.08);  --card-dim-hover:rgba(13,148,136,0.15); }
.card-bus16      { --card-color:#d97706; --card-dim:rgba(217,119,6,0.08);   --card-dim-hover:rgba(217,119,6,0.15);  }
.card-uscita     { --card-color:#dc2626; --card-dim:rgba(220,38,38,0.08);   --card-dim-hover:rgba(220,38,38,0.15);  }
.card-rooming    { --card-color:#4f46e5; --card-dim:rgba(79,70,229,0.08);   --card-dim-hover:rgba(79,70,229,0.15);  }
.card-dinner     { --card-color:#16a34a; --card-dim:rgba(22,163,74,0.08);   --card-dim-hover:rgba(22,163,74,0.15);  }
.card-dashboard  { --card-color:#475569; --card-dim:rgba(71,85,105,0.08);   --card-dim-hover:rgba(71,85,105,0.15);  }

/* ─── DARK MODE mobile ───────────────────────────────────────── */
@media (max-width: 768px) and (prefers-color-scheme: dark) {
    .link-card {
        background: var(--surface);
        border-color: var(--border);
        box-shadow: var(--shadow-sm);
    }
    .link-card:hover {
        background: var(--surface-2);
        box-shadow: var(--shadow);
    }
    .card-label { color: var(--text-2); }
    #digitalClock { color: var(--accent); background: var(--accent-dim); }
}

/* ─── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 480px) {
    .links-grid  { gap: 10px; max-width: 360px; }
    .card-icon   { width: 40px; height: 40px; border-radius: 10px; }
    .card-icon svg { width: 20px; height: 20px; }
    .card-label  { font-size: 10px; }
    .link-card   { padding: 16px 8px 13px; border-radius: 12px; gap: 8px; }
    h1           { font-size: 1.4rem; }
}

</style>
</head>
<body>

<div class="header-container">
    <div class="header-eyebrow">Convitto 2025</div>
    <h1>Pannello di controllo</h1>
    <div class="header-time">
        <div id="todayDate">—</div>
        <div id="digitalClock">00:00:00</div>
    </div>
</div>

<div class="links-grid">

    <a href="roomcloud.html" class="link-card card-cloud">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M17.5 19H9C7 19 4 18 4 14.5C4 11 7 10 7.5 10C8 7 10 5 13 5C16 5 18 7 18.5 10C21 10.5 22 12.5 22 14.5C22 17 20 19 17.5 19Z"/></svg>
        </div>
        <span class="card-label">Cloud</span>
    </a>

    <a href="cruscotto.html" class="link-card card-cruscotto">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/><path d="M7 4l-2 2M19 4l2 2"/></svg>
        </div>
        <span class="card-label">Cruscotto</span>
    </a>

    <a href="bus-8.html" class="link-card card-bus8">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M4 18h16M4 18v-9c0-2 2-4 4-4h8c2 0 4 2 4 4v9M4 18v2M20 18v2"/><path d="M6 13h12"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
        </div>
        <span class="card-label">Bus 8</span>
    </a>

    <a href="transfer.html" class="link-card card-transfer">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M7 10h12M15 6l4 4-4 4"/><path d="M17 14H5M9 10l-4 4 4 4"/></svg>
        </div>
        <span class="card-label">Transfer</span>
    </a>

    <a href="bus-16.html" class="link-card card-bus16">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><polygon points="6,6 18,6 21,12 18,18 6,18 3,12"/><rect x="7" y="10" width="3" height="3" rx="0.5"/><rect x="15" y="10" width="3" height="3" rx="0.5"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
        </div>
        <span class="card-label">Bus 16</span>
    </a>

    <a href="uscita.html" class="link-card card-uscita">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M15 12H3M12 15l3-3-3-3"/><path d="M9 21H17c2 0 3-1 3-3V6c0-2-1-3-3-3H9"/></svg>
        </div>
        <span class="card-label">Uscita</span>
    </a>

    <a href="rooming.html" class="link-card card-rooming">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M3 10L12 3l9 7v11H3V10Z"/><path d="M9 14h6M9 17h4"/></svg>
        </div>
        <span class="card-label">Rooming</span>
    </a>

    <a href="presenze-dinner.html" class="link-card card-dinner">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        </div>

    <a href="dashboard.html" class="link-card card-dashboard">
        <div class="card-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
        </div>
        <span class="card-label">Dashboard</span>
    </a>

</div>

<script>
function updateDateTime() {
    const now = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('todayDate').textContent =
        now.toLocaleDateString('it-IT', options).replace(/^\w/, c => c.toUpperCase());
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('digitalClock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateDateTime, 1000);
updateDateTime();
</script>
</body>
</html>
