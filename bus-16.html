<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 16 — Schema Settimanale Pomeriggio</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
    <button class="btn" id="logoutBtn">LOGOUT</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Settimanale Pomeriggio — ore 16</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-class">Classe</div>
            <div class="cell-name">Nome</div>
            <div class="cell-check">LU</div>
            <div class="cell-check">MA</div>
            <div class="cell-check">ME</div>
            <div class="cell-check">GI</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-class">Classe</div>
            <div class="cell-name">Nome</div>
            <div class="cell-check">LU</div>
            <div class="cell-check">MA</div>
            <div class="cell-check">ME</div>
            <div class="cell-check">GI</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-class">Classe</div>
            <div class="cell-name">Nome</div>
            <div class="cell-check">LU</div>
            <div class="cell-check">MA</div>
            <div class="cell-check">ME</div>
            <div class="cell-check">GI</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script type="module">
    import { initAuth, getStudenti, getConvittori, logout } from "./js/auth.js";
    
    // Proteggi la pagina
    const user = await initAuth(true, "login.html");
    
    if (user) {
        const tutti = await getStudenti();
        // Filtra convittori (room valida 101-221)
        let validi = getConvittori(tutti);
        
        // Esclude 2A, 2B e classi con "P"
        validi = validi.filter(s => {
            const classe = s.classe.toUpperCase();
            const escluse = ["2A", "2B"];
            return !escluse.includes(classe) && !classe.includes("P") && s.cognome;
        });
        
        // Ordinamento: classe -> gruppo -> cognome
        validi.sort((a, b) => {
            const compClasse = (a.classe || '').localeCompare(b.classe || '', undefined, { numeric: true });
            if (compClasse !== 0) return compClasse;
            const gA = a.gruppo || "";
            const gB = b.gruppo || "";
            const compGruppo = gA.localeCompare(gB);
            if (compGruppo !== 0) return compGruppo;
            return (a.cognome || '').localeCompare(b.cognome || '');
        });
        
        // Costruisci lista con separatori tra classi diverse
        const elementiFinali = [];
        let ultimaClasse = null;
        
        validi.forEach((studente) => {
            if (ultimaClasse !== null && studente.classe !== ultimaClasse) {
                elementiFinali.push({ type: 'separator' });
            }
            elementiFinali.push({ type: 'student', data: studente });
            ultimaClasse = studente.classe;
        });
        
        // Distribuzione in 3 colonne
        const totaleElementi = elementiFinali.length;
        const itemsPerColonna = Math.ceil(totaleElementi / 3);
        
        const colonne = [[], [], []];
        elementiFinali.forEach((elemento, idx) => {
            const colonnaIdx = Math.floor(idx / itemsPerColonna);
            colonne[colonnaIdx].push(elemento);
        });
        
        renderColonna(0, colonne[0]);
        renderColonna(1, colonne[1]);
        renderColonna(2, colonne[2]);
    }
    
    function renderColonna(indice, elementi) {
        const container = document.getElementById(`col${indice}`);
        if (!container) return;
        
        if (!elementi || elementi.length === 0) {
            container.innerHTML = '<div class="loading-message">— nessun passeggero —</div>';
            return;
        }
        
        let html = '';
        for (let el of elementi) {
            if (el.type === 'separator') {
                html += `<div class="class-separator"></div>`;
            } else {
                const s = el.data;
                const infoClasse = `${s.classe || '—'} ${s.percorso || ''} ${s.gruppo ? '• ' + s.gruppo : ''}`.trim();
                
                let bgClass = "";
                if (s.classe === "5A") {
                    if (s.gruppo === "G1") bgClass = "bg-5a-g1";
                    if (s.gruppo === "G2") bgClass = "bg-5a-g2";
                } else if (s.classe === "5B") {
                    if (s.gruppo === "G1") bgClass = "bg-5b-g1";
                    if (s.gruppo === "G2") bgClass = "bg-5b-g2";
                }
                
                /* CORRETTO: Sostituito student-row con row-student coerente col CSS */
                html += `
                    <div class="row-student ${bgClass}">
                        <div class="cell-class">${escapeHtml(infoClasse)}</div>
                        <div class="cell-name" style="cursor:pointer"><b>${escapeHtml(s.cognome || '')}</b> ${escapeHtml(s.nome || '')}</div>
                        <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
                        <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
                        <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
                        <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
                    </div>
                `;
            }
        }
        container.innerHTML = html;
        
        // Aggiungi event listener
        container.querySelectorAll('.row-student').forEach(row => {
            const nameCell = row.querySelector('.cell-name');
            const checkBoxes = row.querySelectorAll('.check-box');
            
            if (nameCell) {
                nameCell.addEventListener('click', () => row.classList.toggle('row-crossed'));
            }
            checkBoxes.forEach(checkBox => {
                checkBox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    checkBox.classList.toggle('checked');
                });
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
</script>
</body>
</html>
