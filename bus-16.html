<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 16 — Trasporto Pomeriggio</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA ELENCO</button>
    <button class="btn" id="refreshDataBtn" style="margin-left: 10px;">⟳ AGGIORNA DATI</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Pomeriggio — ore 16</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script>
    // Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyA2CZmgpuWsaLXiKoSQmnigf67MJI44Rus",
        authDomain: "anagrafica25.firebaseapp.com",
        databaseURL: "https://anagrafica25-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "anagrafica25",
        storageBucket: "anagrafica25.firebasestorage.app",
        messagingSenderId: "724474113103",
        appId: "1:724474113103:web:065ae533efb97d7a080e3a",
        measurementId: "G-MBZW81SSH6"
    };

    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Carica gli studenti associati al bus pomeridiano (ore 16)
    async function caricaStudentiBus16() {
        mostraMessaggioCaricamento();

        try {
            const snapshot = await database.ref('studenti').once('value');
            const studentiData = snapshot.val();

            if (!studentiData) {
                throw new Error("Nessun dato trovato nel database.");
            }

            let studentiList = [];
            for (let id in studentiData) {
                const s = studentiData[id];
                
                const nomeCompleto = s.nome && s.cognome ? `${s.nome} ${s.cognome}` : (s.fullName || s.name || "Sconosciuto");
                const stanza = s.room || s.stanza || s.numeroStanza || "";
                const classe = s.classe || s.className || s.grade || "";
                
                // Controllo flessibile sul booleano del bus pomeridiano delle 16
                const busPomeriggio = (s.busPomeriggio16 === true || s.bus16 === true || s.busOre16 === true);
                
                if (busPomeriggio) {
                    studentiList.push({
                        nome: nomeCompleto,
                        stanza: stanza,
                        classe: classe
                    });
                }
            }

            if (studentiList.length === 0) {
                mostraMessaggioNessunDato();
                return;
            }

            // Ordinamento fisso: per stanza, poi per nome alfabetico
            studentiList.sort((a, b) => {
                if (a.stanza < b.stanza) return -1;
                if (a.stanza > b.stanza) return 1;
                return a.nome.localeCompare(b.nome);
            });

            // Distribuzione ciclica e pulita sulle 3 colonne macro per la stampa orizzontale
            const colonne = [[], [], []];
            for (let i = 0; i < studentiList.length; i++) {
                colonne[i % 3].push(studentiList[i]);
            }

            renderizzaColonna(0, colonne[0]);
            renderizzaColonna(1, colonne[1]);
            renderizzaColonna(2, colonne[2]);

        } catch (error) {
            console.error("Errore di caricamento:", error);
            mostraErrore(`Errore: ${error.message}`);
        }
    }

    function mostraMessaggioCaricamento() {
        document.getElementById('col0').innerHTML = `<div class="loading-message">⏳ Caricamento passeggeri ore 16:00...</div>`;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function mostraMessaggioNessunDato() {
        document.getElementById('col0').innerHTML = `<div class="error-message" style="background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2);">ℹ️ Nessun passeggero registrato per le ore 16:00.</div>`;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function mostraErrore(messaggio) {
        document.getElementById('col0').innerHTML = `<div class="error-message" style="color: var(--absent); background: var(--absent-dim); border: 1px solid var(--absent);">❌ ${messaggio}</div>`;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function renderizzaColonna(indiceColonna, studentiArray) {
        const container = document.getElementById(`col${indiceColonna}`);
        if (!container) return;
        
        if (!studentiArray || studentiArray.length === 0) {
            container.innerHTML = '<div class="loading-message" style="opacity: 0.4;">— vuoto —</div>';
            return;
        }

        let html = '';
        for (let studente of studentiArray) {
            // Struttura originale ad hoc pulita (solo Room, Nome, Classe)
            html += `
                <div class="row-student">
                    <div class="cell-room">${escapeHtml(studente.stanza)}</div>
                    <div class="cell-name"><b>${escapeHtml(studente.nome)}</b></div>
                    <div class="cell-class">${escapeHtml(studente.classe)}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        caricaStudentiBus16();
        
        const refreshBtn = document.getElementById('refreshDataBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', caricaStudentiBus16);
        }
    });
</script>
</body>
</html>
