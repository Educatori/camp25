<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 16 — Trasporto Pomeriggio</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
    <button class="btn" id="refreshDataBtn" style="margin-left: 10px;">⟳ AGGIORNA DATI</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Pomeriggio — ore 16</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Pres.</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Pres.</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Pres.</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script>
    // Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyA2CZmgpuWsaLXiKoSQmnigf67MJI44Rus",
        authDomain: "anagrafica25.firebaseapp.com",
        databaseURL: "https://anagrafica25-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "anagrafica25",
        storageBucket: "anagrafica25.firebasestorage.app",
        messagingSenderId: "724474113103",
        appId: "1:724474113103:web:065ae533efb97d7a080e3a",
        measurementId: "G-MBZW81SSH6"
    };

    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Funzione principale: carica studenti e filtra per bus delle ore 16:00
    async function caricaStudentiBus16() {
        mostraMessaggioCaricamento();

        try {
            const snapshot = await database.ref('studenti').once('value');
            const studentiData = snapshot.val();

            if (!studentiData) {
                throw new Error("Nessun dato trovato nel nodo 'studenti' del database.");
            }

            let studentiList = [];
            for (let id in studentiData) {
                const s = studentiData[id];
                
                const nomeCompleto = s.nome && s.cognome ? `${s.nome} ${s.cognome}` : (s.fullName || s.name || "Sconosciuto");
                const stanza = s.room || s.stanza || s.numeroStanza || "";
                const classe = s.classe || s.className || s.grade || "";
                
                // Filtro specifico per le ore 16: controlla varianti comuni dei campi boolean
                const busPomeriggio = (s.busPomeriggio16 === true || s.bus16 === true || s.busOre16 === true);
                
                if (busPomeriggio) {
                    studentiList.push({
                        id: id,
                        nome: nomeCompleto,
                        stanza: stanza,
                        classe: classe,
                        note: s.note || ""
                    });
                }
            }

            if (studentiList.length === 0) {
                mostraMessaggioNessunDato();
                return;
            }

            // Ordina alfabeticamente o per stanza
            studentiList.sort((a, b) => {
                if (a.stanza < b.stanza) return -1;
                if (a.stanza > b.stanza) return 1;
                return a.nome.localeCompare(b.nome);
            });

            // Distribuzione bilanciata sulle 3 colonne macro
            const colonne = [[], [], []];
            for (let i = 0; i < studentiList.length; i++) {
                colonne[i % 3].push(studentiList[i]);
            }

            renderizzaColonna(0, colonne[0]);
            renderizzaColonna(1, colonne[1]);
            renderizzaColonna(2, colonne[2]);

            // Aggancia l'evento interattivo per depennare la riga al click del checkbox
            inizializzaInterazioni();

        } catch (error) {
            console.error("Errore nel caricamento da Firebase:", error);
            mostreErrore(`Impossibile caricare i dati: ${error.message}`);
        }
    }

    function mostraMessaggioCaricamento() {
        const loadingHtml = `<div class="loading-message">⏳ Caricamento elenco bus 16:00 da Firebase...</div>`;
        document.getElementById('col0').innerHTML = loadingHtml;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function mostraMessaggioNessunDato() {
        const msg = `<div class="error-message" style="background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2);">ℹ️ Nessuno studente con bus pomeriggio ore 16:00 trovato nel database.</div>`;
        document.getElementById('col0').innerHTML = msg;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function mostreErrore(messaggio) {
        const errHtml = `<div class="error-message" style="color: var(--absent); background: var(--absent-dim); border: 1px solid var(--absent);">❌ ${messaggio}</div>`;
        document.getElementById('col0').innerHTML = errHtml;
        document.getElementById('col1').innerHTML = '';
        document.getElementById('col2').innerHTML = '';
    }

    function renderizzaColonna(indiceColonna, studentiArray) {
        const container = document.getElementById(`col${indiceColonna}`);
        if (!container) return;
        
        if (!studentiArray || studentiArray.length === 0) {
            container.innerHTML = '<div class="loading-message" style="opacity: 0.5;">— nessun passeggero —</div>';
            return;
        }

        let html = '';
        for (let studente of studentiArray) {
            const checkId = `pres_16_${indiceColonna}_${studente.id.replace(/[.#$[\]]/g, '_')}`;
            html += `
                <div class="row-student">
                    <div class="cell-room">${escapeHtml(studente.stanza)}</div>
                    <div class="cell-name"><b>${escapeHtml(studente.nome)}</b></div>
                    <div class="cell-class">${escapeHtml(studente.classe)}</div>
                    <div class="cell-check">
                        <input type="checkbox" id="${checkId}" class="presence-check" style="transform: scale(1.1); cursor: pointer;">
                    </div>
                    <div class="cell-notes">
                        <input type="text" placeholder="..." value="${escapeHtml(studente.note)}" class="note-input" data-studentid="${studente.id}">
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // Aggiunge la classe .row-crossed dinamicamente se la spunta è attiva
    function inizializzaInterazioni() {
        const checkboxes = document.querySelectorAll('.presence-check');
        checkboxes.forEach(chk => {
            chk.addEventListener('change', function() {
                const parentRow = this.closest('.row-student');
                if (parentRow) {
                    if (this.checked) {
                        parentRow.classList.add('row-crossed');
                    } else {
                        parentRow.classList.remove('row-crossed');
                    }
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        caricaStudentiBus16();

        const refreshBtn = document.getElementById('refreshDataBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', caricaStudentiBus16);
        }
    });
</script>
</body>
</html>
