<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso — Convitto 2025</title>
    <link rel="stylesheet" href="css/convitto-theme.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            padding: 24px;
            visibility: visible !important; /* Forza visibilità sulla pagina login */
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: var(--radius-xl);
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 14px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-3);
            border: 1px solid var(--border-2);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.88rem;
            outline: none;
            transition: border-color var(--t), box-shadow var(--t);
            box-sizing: border-box;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .field input::placeholder { color: var(--text-muted); }

        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: var(--text-inv);
            border: none;
            border-radius: var(--radius);
            font-family: var(--font);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all var(--t);
        }

        .btn-login:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--absent-dim);
            border: 1px solid rgba(220,38,38,0.25);
            border-radius: var(--radius-sm);
            color: var(--absent);
            font-size: 0.82rem;
            display: none;
        }

        .error-msg.visible { display: block; }

        .login-footer {
            margin-top: 24px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* Spinner per il caricamento */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
     </style>
</head>
<body>

<div class="login-card">
    <img src="assets/Logo.png" alt="Logo" class="login-logo"
         onerror="this.style.display='none'">
    <div class="login-title">Convitto 2025</div>
    <div class="login-sub">Accesso riservato al personale autorizzato</div>

    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nome@esempio.it" autocomplete="email">
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn">ACCEDI</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="login-footer">
        Accesso protetto · Solo utenti autorizzati
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    
    // Inizializza Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // Elementi DOM
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");
    
    // Se già autenticato → redirect
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get("redirect") || "index.html";
            window.location.href = redirect;
        }
    });
    
    // Funzione login
    async function doLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        errorMsg.classList.remove("visible");
        errorMsg.textContent = "";
        
        if (!email || !password) {
            errorMsg.textContent = "Inserisci email e password.";
            errorMsg.classList.add("visible");
            return;
        }
        
        loginBtn.disabled = true;
        loginBtn.textContent = "⏳ Accesso in corso...";
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Il redirect sarà gestito da onAuthStateChanged
        } catch (e) {
            console.error("Errore login:", e.code);
            
            const errorMessages = {
                "auth/user-not-found": "❌ Email non riconosciuta.",
                "auth/wrong-password": "❌ Password errata.",
                "auth/invalid-email": "❌ Formato email non valido.",
                "auth/too-many-requests": "⚠️ Troppi tentativi. Riprova tra qualche minuto.",
                "auth/user-disabled": "⚠️ Account disabilitato.",
                "auth/network-request-failed": "⚠️ Errore di connessione."
            };
            
            errorMsg.textContent = errorMessages[e.code] || `❌ Errore: ${e.message}`;
            errorMsg.classList.add("visible");
            loginBtn.disabled = false;
            loginBtn.textContent = "ACCEDI";
        }
    }
    
    loginBtn.onclick = doLogin;
    passwordInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") doLogin();
    });
    
    emailInput.focus();
</script>
</body>
</html>
