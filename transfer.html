<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer for Lunch</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/transfer-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
    <button class="btn" id="logoutBtn">LOGOUT</button>
</div>

<div class="header-container">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1><a href="index.html">Transfer for Lunch</a></h1>
</div>

<div class="grid-container" id="mainGrid"></div>

<script type="module">
    // 1. Importiamo le funzioni di Firebase da auth.js
    import { initAuth, getStudenti, logout } from "./js/auth.js";
    
    // 2. Proteggiamo la pagina
    const user = await initAuth(true, "login.html");
    
    if (user) {
        try {
            // Prendiamo la lista completa di tutti gli studenti salvati su Firebase
            const tuttiIStudenti = await getStudenti();
            
            // 3. Filtriamo solo gli studenti che partecipano al Transfer for Lunch
            // Controlla se il campo transferLunch (o pranzo/transfer) è attivo su Firebase
            const studentiPranzo = tuttiIStudenti.filter(s => 
                s.transferLunch === true || s.pranzo === true || s.transferPranzo === true
            );

            // 4. Raggruppiamo gli studenti per stanza/classe per popolare i box del CSS
            const stanzeRaggruppate = {};
            
            studentiPranzo.forEach(s => {
                const chiaveStanza = s.stanza || 'Senza Stanza';
                if (!stanzeRaggruppate[chiaveStanza]) {
                    stanzeRaggruppate[chiaveStanza] = {
                        stanza: chiaveStanza,
                        classe: s.classe || '—',
                        isLab: s.isLab === true || s.laboratorio === true, // Gestione badge laboratorio rosso
                        studenti: []
                    };
                }
                stanzeRaggruppate[chiaveStanza].studenti.push(s);
            });

            // 5. Ordiniamo le stanze in modo numerico coerente
            const stanzeOrdinate = Object.values(stanzeRaggruppate).sort((a, b) => {
                const numA = parseInt(a.stanza);
                const numB = parseInt(b.stanza);
                const haNumA = !isNaN(numA);
                const haNumB = !isNaN(numB);

                if (haNumA && haNumB) return numA - numB;
                if (haNumA && !haNumB) return -1;
                if (!haNumA && haNumB) return 1;
                return a.stanza.localeCompare(b.stanza);
            });

            // Inoltre ordiniamo gli studenti dentro ogni singola stanza alfabeticamente
            stanzeOrdinate.forEach(blocco => {
                blocco.studenti.sort((a, b) => (a.cognome || '').localeCompare(b.cognome || ''));
            });
            
            // 6. Rendering strutturato dentro la griglia originale
            renderGrigliaPranzo(stanzeOrdinate);

        } catch (error) {
            console.error("Errore durante il recupero degli studenti:", error);
            document.getElementById("mainGrid").innerHTML = '<div class="error-message">Errore nel caricamento dei dati da Firebase.</div>';
        }
    }
    
    function renderGrigliaPranzo(stanze) {
        const container = document.getElementById("mainGrid");
        if (!container) return;
        
        if (!stanze || stanze.length === 0) {
            container.innerHTML = '<div class="loading-message">— nessun passeggero trovato per il pranzo —</div>';
            return;
        }
        
        let html = '';
        
        // Genera i box strutturati richiesti dal file CSS originale
        for (let blocco of stanze) {
            const classeLab = blocco.isLab ? 'has-lab' : '';
            const badgeLab = blocco.isLab ? '<span class="lab-badge">LAB</span>' : '';
            
            html += `
                <div class="room-box ${classeLab}">
                    <div class="room-info">
                        ${escapeHtml(blocco.stanza)}
                        ${badgeLab}
                        <span class="count-badge">${blocco.studenti.length}</span>
                    </div>
                    <div class="occupants-list">
                        ${blocco.studenti.map(s => `
                            <div class="row-student">
                                <div class="student-name" style="cursor:pointer">
                                    <b>${escapeHtml(s.cognome || '')}</b> ${escapeHtml(s.nome || '')}
                                </div>
                                <div class="student-details">${escapeHtml(s.classe || '')}</div>
                                <div class="cell-check" style="width:24px; padding-left:4px;">
                                    <div class="check-box" style="cursor:pointer"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Rigenerazione eventi interattivi sulle righe interne dei box originali
        container.querySelectorAll('.row-student').forEach(row => {
            const nameTarget = row.querySelector('.student-name');
            const checkBox = row.querySelector('.check-box');
            
            if (nameTarget) {
                nameTarget.addEventListener('click', () => row.classList.toggle('row-crossed'));
            }
            if (checkBox) {
                checkBox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    checkBox.classList.toggle('checked');
                });
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Gestione Logout
    document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
</script>
</body>
</html>
