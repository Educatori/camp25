<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer for Lunch</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/transfer-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
    <button class="btn" id="logoutBtn">LOGOUT</button>
</div>

<div class="header-container">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1><a href="index.html">Transfer for Lunch</a></h1>
</div>

<div class="grid-container" id="mainGrid"></div>

<script type="module">
    // 1. Importiamo le funzioni di Firebase da auth.js
    import { initAuth, getStudenti, logout } from "./js/auth.js";
    
    // 2. Proteggiamo la pagina
    const user = await initAuth(true, "login.html");
    
    if (user) {
        try {
            // Prendiamo la lista completa di tutti gli studenti salvati su Firebase
            const tuttiIStudenti = await getStudenti();
            
            // 3. Ordinamento globale per stanza
            // I numeri di stanza reali vanno all'inizio, chi non ha la stanza (o non è un numero) va in fondo
            tuttiIStudenti.sort((a, b) => {
                const stanzaA = parseInt(a.stanza);
                const stanzaB = parseInt(b.stanza);
                
                const haStanzaA = !isNaN(stanzaA);
                const haStanzaB = !isNaN(stanzaB);

                if (haStanzaA && haStanzaB) return stanzaA - stanzaB; // Entrambi hanno la stanza numerica
                if (haStanzaA && !haStanzaB) return -1;               // A ha la stanza, B no (A va prima)
                if (!haStanzaA && haStanzaB) return 1;                // B ha la stanza, A no (B va prima)
                
                // Se nessuno dei due ha la stanza, ordina alfabeticamente per cognome
                return (a.cognome || '').localeCompare(b.cognome || '');
            });
            
            // 4. Rendering completo nella griglia
            renderGrigliaPranzo(tuttiIStudenti);

        } catch (error) {
            console.error("Errore durante il recupero degli studenti:", error);
            document.getElementById("mainGrid").innerHTML = '<div class="error-message">Errore nel caricamento dei dati da Firebase.</div>';
        }
    }
    
    function renderGrigliaPranzo(studenti) {
        const container = document.getElementById("mainGrid");
        if (!container) return;
        
        if (!studenti || studenti.length === 0) {
            container.innerHTML = '<div class="loading-message">— nessun passeggero trovato —</div>';
            return;
        }
        
        let html = '';
        for (let s of studenti) {
            html += `
                <div class="student-row">
                    <div class="cell-room">${escapeHtml(s.stanza || '—')}</div>
                    <div class="cell-name" style="cursor:pointer"><b>${escapeHtml(s.cognome || '')}</b> ${escapeHtml(s.nome || '')}</div>
                    <div class="cell-class">${escapeHtml(s.classe || '—')}</div>
                    <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
                    <div class="cell-notes"><div class="line-notes"></div></div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Eventi di interazione (depennamento riga e checkbox presenza)
        container.querySelectorAll('.student-row').forEach(row => {
            const nameCell = row.querySelector('.cell-name');
            const checkBox = row.querySelector('.check-box');
            
            if (nameCell) {
                nameCell.addEventListener('click', () => row.classList.toggle('row-crossed'));
            }
            if (checkBox) {
                checkBox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    checkBox.classList.toggle('checked');
                });
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Gestione Logout
    document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
</script>
</body>
</html>
