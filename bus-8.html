<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS — Trasporto Mattino</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-8-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Mattino</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">C </div>
            <div class="cell-check">P </div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class"> C </div>
            <div class="cell-check"> P </div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">C </div>
            <div class="cell-check">P </div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script type="module">
    // Import auth functions
    import { initAuth, getStudentiBus8 } from './auth.js';
    
    // Inizializza autenticazione - questa pagina è protetta
    await initAuth(true, "login.html");
    
    // Carica e mostra gli studenti del bus 8:00
    async function loadBusStudents() {
        try {
            // Mostra loading
            const cols = [0, 1, 2];
            cols.forEach(col => {
                const container = document.getElementById(`col${col}`);
                if (container) container.innerHTML = '<div class="loading">Caricamento studenti...</div>';
            });
            
            // Ottieni studenti bus 8:00
            const busStudents = await getStudentiBus8();
            
            if (!busStudents || busStudents.length === 0) {
                cols.forEach(col => {
                    const container = document.getElementById(`col${col}`);
                    if (container) container.innerHTML = '<div class="no-data">Nessuno studente da visualizzare per il bus 8:00</div>';
                });
                return;
            }
            
            // 1. Ordina l'intera lista per COGNOME in ordine alfabetico globale
            busStudents.sort((a, b) => {
                const cognomeA = (a.cognome || a.nomeCompleto || '').trim().toLowerCase();
                const cognomeB = (b.cognome || b.nomeCompleto || '').trim().toLowerCase();
                return cognomeA.localeCompare(cognomeB, 'it', { sensitivity: 'base' });
            });
            
            // 2. Dividi la lista in 3 blocchi sequenziali per le colonne
            const totalStudents = busStudents.length;
            const studentsPerCol = Math.ceil(totalStudents / 3);
            
            const studentsByColumn = [
                busStudents.slice(0, studentsPerCol),                               // Dalla A alla M...
                busStudents.slice(studentsPerCol, studentsPerCol * 2),               // Centrale...
                busStudents.slice(studentsPerCol * 2)                                // ...fino alla Z
            ];
            
            // Popola le colonne
            for (let i = 0; i < 3; i++) {
                const container = document.getElementById(`col${i}`);
                if (!container) continue;
                
                if (studentsByColumn[i].length === 0) {
                    container.innerHTML = '<div class="empty-column">Nessuno studente in questa fascia</div>';
                    continue;
                }
                
                container.innerHTML = studentsByColumn[i].map((student, index) => {
                    // Log di debug opzionale per il primo elemento di ogni colonna se servisse ispezionare
                    if (index === 0) console.log("Dati studente:", student);

                    // Recupera gli stati salvati per impostare le classi corrette al caricamento
                    const isChecked = localStorage.getItem(`bus_presence_${student.id}`) === 'true';
                    const savedNote = localStorage.getItem(`bus_note_${student.id}`) || '';
                    
                    // Uniamo la classe con l'emoji del percorso (es: "4B 🍷")
                    const classeEPercorso = `${student.classe || '-'} ${student.percorso || ''}`.trim();

                    // Gestione sicura della stanza (controlla sia room che stanza, rimuove eventuali spazi)
                    const camera = String(student.room || student.stanza || '-').trim();

                    // Formatta il nome per mostrare prima il COGNOME e poi il NOME
                    let nomeVisualizzato = '';
                    if (student.cognome && student.nome) {
                        nomeVisualizzato = `${student.cognome.toUpperCase()} ${student.nome}`;
                    } else {
                        // Fallback se nel DB c'è solo la stringa pre-unita 'nomeCompleto'
                        nomeVisualizzato = student.nomeCompleto || `${student.nome || ''} ${student.cognome || ''}`.trim();
                    }

                    return `
                        <div class="student-row" data-student-id="${student.id}">
                            <div class="cell-room">${camera}</div>
                            <div class="cell-name">${nomeVisualizzato}</div>
                            <div class="cell-class">${classeEPercorso}</div>
                            <div class="cell-check">
                                <div class="check-box ${isChecked ? 'checked' : ''}" data-id="${student.id}"></div>
                            </div>
                            <div class="cell-notes">
                                <input type="text" class="bus-note-field" value="${savedNote}" placeholder="..." data-id="${student.id}">
                                <div class="line-notes-print">${savedNote}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Aggiungi event listeners per salvare le presenze localmente
            attachEventListeners();
            
            console.log(`Caricati ${busStudents.length} studenti ordinati per colonna per il bus 8:00`);
        } catch (error) {
            console.error("Errore nel caricamento degli studenti:", error);
            const cols = [0, 1, 2];
            cols.forEach(col => {
                const container = document.getElementById(`col${col}`);
                if (container) container.innerHTML = '<div class="error">Errore nel caricamento dei dati. Ricarica la pagina.</div>';
            });
        }
    }
    
    // Attacca event listeners per salvare dati in localStorage
    function attachEventListeners() {
        // Gestione dei finti checkbox con i click
        document.querySelectorAll('.check-box').forEach(checkbox => {
            checkbox.addEventListener('click', (e) => {
                const studentId = e.currentTarget.dataset.id;
                const isChecked = e.currentTarget.classList.toggle('checked');
                localStorage.setItem(`bus_presence_${studentId}`, isChecked);
            });
        });
        
        // Gestione dei campi di testo per le note
        document.querySelectorAll('.bus-note-field').forEach(input => {
            input.addEventListener('input', (e) => {
                const studentId = e.target.dataset.id;
                localStorage.setItem(`bus_note_${studentId}`, e.target.value);
                // Aggiorna lo specchietto per la stampa
                const printMirror = e.target.nextElementSibling;
                if (printMirror) printMirror.textContent = e.target.value;
            });
        });
    }
    
    // Avvia l'applicazione
    loadBusStudents().catch(console.error);
</script>

</body>
</html>
