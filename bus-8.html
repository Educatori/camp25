<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 8 — Trasporto Mattino</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
    <button class="btn" id="logoutBtn">LOGOUT</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Mattino — ore 8</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script type="module">
    // Solo AGGIUNTA: autenticazione e caricamento dati
    // La grafica rimane IDENTICA all'originale
    
    import { initAuth, getStudenti, getStudentiBus8, logout } from "./js/auth.js";
    
    // Proteggi la pagina
    const user = await initAuth(true, "login.html");
    
    if (user) {
        // Carica studenti e filtra bus 8:00 (classe + convittore)
        const tutti = await getStudenti();
        const studentiBus8 = getStudentiBus8(tutti);
        
        // Ordina per stanza
        studentiBus8.sort((a, b) => {
            const stanzaA = parseInt(a.stanza) || 999;
            const stanzaB = parseInt(b.stanza) || 999;
            return stanzaA - stanzaB;
        });
        
        // Distribuisci su 3 colonne
        const colonne = [[], [], []];
        studentiBus8.forEach((s, i) => colonne[i % 3].push(s));
        
        // Renderizza (senza cambiare struttura HTML)
        renderColonna(0, colonne[0]);
        renderColonna(1, colonne[1]);
        renderColonna(2, colonne[2]);
    }
    
    function renderColonna(indice, studenti) {
        const container = document.getElementById(`col${indice}`);
        if (!container) return;
        
        if (!studenti || studenti.length === 0) {
            container.innerHTML = '<div class="loading-message">— nessun passeggero —</div>';
            return;
        }
        
        let html = '';
        for (let s of studenti) {
            html += `
                <div class="row-student">
                    <div class="cell-room">${escapeHtml(s.stanza || '—')}</div>
                    <div class="cell-name">${escapeHtml(s.nomeCompleto)}</div>
                    <div class="cell-class">${escapeHtml(s.classe)}</div>
                    <div class="cell-check"><input type="checkbox"></div>
                    <div class="cell-notes"><input type="text" placeholder="Note"></div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Logout
    document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
</script>
</body>
</html>
