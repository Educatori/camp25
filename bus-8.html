<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 8 — Trasporto Mattino</title>
    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Mattino</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col0"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col1"></div>
    </div>
    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col2"></div>
    </div>
</div>

<script type="module">
    // Import auth functions
    import { initAuth, getStudentiBus8, logout, invalidateAllCache } from './auth.js';
    
    // Inizializza autenticazione - questa pagina è protetta
    // Se l'utente non è autorizzato, verrà reindirizzato a login.html
    await initAuth(true, "login.html");
    
    // Carica e mostra gli studenti del bus 8:00
    async function loadBusStudents() {
        try {
            // Mostra loading
            const cols = [0, 1, 2];
            cols.forEach(col => {
                const container = document.getElementById(`col${col}`);
                if (container) container.innerHTML = '<div class="loading">Caricamento studenti...</div>';
            });
            
            // Ottieni studenti bus 8:00 (solo convittori delle classi specifiche)
            const busStudents = await getStudentiBus8();
            
            if (!busStudents || busStudents.length === 0) {
                cols.forEach(col => {
                    const container = document.getElementById(`col${col}`);
                    if (container) container.innerHTML = '<div class="no-data">Nessuno studente da visualizzare per il bus 8:00</div>';
                });
                return;
            }
            
            // Distribuisci studenti nelle 3 colonne (per room)
            const studentsByColumn = [[], [], []];
            
            busStudents.forEach(student => {
                // Distribuzione basata sul numero di stanza per bilanciare le colonne
                const roomNum = parseInt(student.stanza) || 0;
                let colIndex = 0;
                
                if (roomNum >= 101 && roomNum <= 140) colIndex = 0;
                else if (roomNum >= 141 && roomNum <= 180) colIndex = 1;
                else colIndex = 2;
                
                studentsByColumn[colIndex].push(student);
            });
            
            // Ordina per stanza all'interno di ogni colonna
            studentsByColumn.forEach(col => {
                col.sort((a, b) => {
                    const roomA = parseInt(a.stanza) || 0;
                    const roomB = parseInt(b.stanza) || 0;
                    return roomA - roomB;
                });
            });
            
            // Popola le colonne
            for (let i = 0; i < 3; i++) {
                const container = document.getElementById(`col${i}`);
                if (!container) continue;
                
                if (studentsByColumn[i].length === 0) {
                    container.innerHTML = '<div class="empty-column">Nessuno studente in questa fascia</div>';
                    continue;
                }
                
                container.innerHTML = studentsByColumn[i].map(student => `
                    <div class="student-row" data-student-id="${student.id}">
                        <div class="cell-room">${student.stanza || '-'}</div>
                        <div class="cell-name">${student.nomeCompleto || `${student.nome} ${student.cognome}`}</div>
                        <div class="cell-class">${student.classe || '-'}</div>
                        <div class="cell-check">
                            <input type="checkbox" class="presence-check" data-id="${student.id}" data-name="${student.nomeCompleto}">
                        </div>
                        <div class="cell-notes">
                            <input type="text" class="note-input" placeholder="Note..." data-id="${student.id}">
                        </div>
                    </div>
                `).join('');
            }
            
            // Aggiungi event listeners per salvare le presenze localmente
            attachEventListeners();
            
            console.log(`Caricati ${busStudents.length} studenti per il bus 8:00`);
        } catch (error) {
            console.error("Errore nel caricamento degli studenti:", error);
            const cols = [0, 1, 2];
            cols.forEach(col => {
                const container = document.getElementById(`col${col}`);
                if (container) container.innerHTML = '<div class="error">Errore nel caricamento dei dati. Ricarica la pagina.</div>';
            });
        }
    }
    
    // Attacca event listeners per salvare dati in localStorage
    function attachEventListeners() {
        // Salva stato checkbox
        document.querySelectorAll('.presence-check').forEach(checkbox => {
            const studentId = checkbox.dataset.id;
            const savedState = localStorage.getItem(`bus_presence_${studentId}`);
            if (savedState === 'true') {
                checkbox.checked = true;
            }
            
            checkbox.addEventListener('change', (e) => {
                localStorage.setItem(`bus_presence_${studentId}`, e.target.checked);
                console.log(`Presenza studente ${studentId}: ${e.target.checked}`);
            });
        });
        
        // Salva note
        document.querySelectorAll('.note-input').forEach(input => {
            const studentId = input.dataset.id;
            const savedNote = localStorage.getItem(`bus_note_${studentId}`);
            if (savedNote) {
                input.value = savedNote;
            }
            
            input.addEventListener('blur', (e) => {
                localStorage.setItem(`bus_note_${studentId}`, e.target.value);
                console.log(`Nota studente ${studentId}: ${e.target.value}`);
            });
        });
    }
    
    // Pulisci tutti i dati salvati (utile per reset giornaliero)
    window.clearBusData = function() {
        if (confirm('Sei sicuro di voler cancellare tutte le presenze e note salvate?')) {
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                if (key.startsWith('bus_presence_') || key.startsWith('bus_note_')) {
                    localStorage.removeItem(key);
                }
            });
            // Ricarica la pagina per resettare la UI
            location.reload();
        }
    };
    
    // Esporta i dati in formato CSV
    window.exportBusData = function() {
        const rows = [];
        rows.push(['Stanza', 'Nome', 'Classe', 'Presente', 'Note']);
        
        document.querySelectorAll('.student-row').forEach(row => {
            const room = row.querySelector('.cell-room')?.innerText || '';
            const name = row.querySelector('.cell-name')?.innerText || '';
            const classe = row.querySelector('.cell-class')?.innerText || '';
            const present = row.querySelector('.presence-check')?.checked ? 'Sì' : 'No';
            const note = row.querySelector('.note-input')?.value || '';
            
            rows.push([room, name, classe, present, note]);
        });
        
        const csvContent = rows.map(row => row.join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `bus_8_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    };
    
    // Aggiungi bottoni di controllo se non esistono
    function addControlButtons() {
        const printDiv = document.querySelector('.no-print');
        if (printDiv && !document.getElementById('exportBusBtn')) {
            const exportBtn = document.createElement('button');
            exportBtn.id = 'exportBusBtn';
            exportBtn.className = 'btn';
            exportBtn.innerHTML = '📊 ESPORTA CSV';
            exportBtn.onclick = window.exportBusData;
            exportBtn.style.marginLeft = '10px';
            
            const clearBtn = document.createElement('button');
            clearBtn.id = 'clearBusBtn';
            clearBtn.className = 'btn btn-danger';
            clearBtn.innerHTML = '🗑️ RESET DATI';
            clearBtn.onclick = window.clearBusData;
            clearBtn.style.marginLeft = '10px';
            
            const refreshBtn = document.createElement('button');
            refreshBtn.id = 'refreshBusBtn';
            refreshBtn.className = 'btn';
            refreshBtn.innerHTML = '🔄 RICARICA';
            refreshBtn.onclick = () => location.reload();
            refreshBtn.style.marginLeft = '10px';
            
            printDiv.appendChild(exportBtn);
            printDiv.appendChild(clearBtn);
            printDiv.appendChild(refreshBtn);
        }
    }
    
    // Logout function
    window.logoutUser = async function() {
        if (confirm('Sei sicuro di voler uscire?')) {
            await logout();
        }
    };
    
    // Aggiungi pulsante logout se non esiste
    function addLogoutButton() {
        const header = document.querySelector('.header-main');
        if (header && !document.getElementById('logoutBtn')) {
            const logoutBtn = document.createElement('button');
            logoutBtn.id = 'logoutBtn';
            logoutBtn.className = 'btn btn-logout';
            logoutBtn.innerHTML = '🚪 LOGOUT';
            logoutBtn.onclick = window.logoutUser;
            logoutBtn.style.float = 'right';
            logoutBtn.style.marginTop = '10px';
            header.appendChild(logoutBtn);
        }
    }
    
    // Inizializza la pagina
    async function init() {
        await loadBusStudents();
        addControlButtons();
        addLogoutButton();
    }
    
    // Avvia l'applicazione
    init().catch(console.error);
</script>
</body>
</html>
