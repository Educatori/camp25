<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>BUS ore 8 — Trasporto Mattino</title>

    <link rel="stylesheet" href="css/campus-theme.css">
    <link rel="stylesheet" href="css/bus-style.css">
</head>
<body>

<div class="no-print">
    <button class="btn" onclick="window.print()">STAMPA</button>
</div>

<div class="header-main">
    <img src="assets/Logo.png" alt="Logo" class="print-logo">
    <h1>
        <a href="index.html">Bus Mattino</a>
    </h1>
</div>

<div class="grid-wrapper" id="mainWrapper">

    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col0"></div>
    </div>

    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col1"></div>
    </div>

    <div class="macro-column">
        <div class="column-header">
            <div class="cell-room">Room</div>
            <div class="cell-name">Nome</div>
            <div class="cell-class">Classe</div>
            <div class="cell-check">Presenza</div>
            <div class="cell-notes">Note</div>
        </div>
        <div id="col2"></div>
    </div>

</div>

<!-- Auth -->
<script type="module" src="js/auth.js"></script>

<!-- Script principale -->
<script type="module">

import {
    getConvittoData,
    getConvittori
} from "./js/auth.js";

import { renderBus8 } from "./js/bus-8-script.js";

/* =========================================================
   Attende autenticazione Firebase
   ========================================================= */

document.addEventListener("authReady", async () => {

    try {

        // Carica tutto il DB
        const data = await getConvittoData();

        // Recupera lista studenti
        const tuttiStudenti = data.studenti || [];

        // Filtra convittori
        const convittori = getConvittori(tuttiStudenti);

        // Render pagina
        renderBus8(convittori, data);

    } catch (err) {

        console.error("Errore caricamento dati:", err);

        document.body.innerHTML = `
            <div style="padding:40px;font-family:sans-serif">
                Errore caricamento dati Firebase
            </div>
        `;
    }

});

</script>

</body>
</html>
